<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sketch-holder"></div>

<script type="module">
    import {StartScene} from "./src/start-scene";
    import {EditScene, initScenes} from "dkwdpil";
    import {EventScene} from "./src/event-scene.ts";
    import {IntroScene} from "./src/intro-scene.ts";
    import {SetupScene} from "./src/setup-scene.ts";
    import {DrawingScene} from "./src/drawing-scene.ts";
    import {ScratchExplained} from "./src/scratch-explained.ts";
    import {PaintFigure} from "./src/paint-figure.ts";
    import {DrawingYourselfScene} from "./src/drawing-yourself-scene.ts";
    import {NavigationScene} from "./src/navigation-scene.ts";
    import {ExplainScene} from "./src/explain-scene.ts";

    const sketchHolder = document.getElementById('sketch-holder');
    if (!sketchHolder) {
        throw new Error('Could not find sketch holder element');
    }
    initScenes(
        sketchHolder,
        [
            ["startScene", new StartScene()],
            ["editScene", new EditScene("startScene")],
            ["eventScene", new EventScene()],
            // intro / setup
            ["introScene", new IntroScene()],
            ["setupScene", new SetupScene()],

            // scratch explained
            ["scratchExplained", new ScratchExplained()],

            // drawing
            ["drawingScene", new NavigationScene([
                new DrawingScene(), new PaintFigure(),
                new ExplainScene(
                    "Selber zeichnen",
                    "scratchExplained",
                    "paintTools.png",
                    [
                        "Auf der linken Seite seht ihr einige Zeichenwerkzeuge.",
                        "Für den Anfang würde ich euch den Stift empfehlen.", "",
                    ],
                    [[4.59, -0.64]]
                ),
                new ExplainScene(
                    "Selber zeichnen",
                    "scratchExplained",
                    "paintTools.png",
                    [
                        "Außerdem könnt ihr die Farbe und die Stiftdicke einstellen.",
                    ],
                    [[6.89, 5.4, Math.PI / 2], [16.75, 5.4, Math.PI / 2]]
                ),
                new ExplainScene(
                    "Striche entfernen",
                    "scratchExplained",
                    "paintTools.png",
                    [
                        "Wenn du wieder etwas entfernen möchtest, kannst du dafür",
                        "den Radiergummi verwenden.", "",
                        "Alternativ kannst du einzelne Striche auch mit dem Zeiger",
                        "auswählen und dann auf die Entfernen-Taste drücken."
                    ],
                    [[8.44, -0.98], [4.61, 1.68]]
                ),
                new ExplainScene(
                    "Mehrere Kostüme",
                    "scratchExplained",
                    "multipleCostumes.png",
                    [
                        "In Scratch kann eine Figure unterschiedliche", "Kostüme haben.", "",
                        "Das eignet sich z.B. super dafür, die Figur", "bewegen zu lassen.", "",
                        "Du kannst auch mit Code-Blöcken zwischen den", "Kostümen wechseln.", "",
                        "Mit den Knöpfen oben kannst du zwischen den", "Kostümen und Skripten wechseln!", "",
                    ],
                    [[5.39, 9, Math.PI * 3 / 2], [10.86, 9, Math.PI * 3 / 2]]
                ),
                new ExplainScene(
                    "Aufgabe: Eigenes Kostüm",
                    "scratchExplained",
                    "yourOwnFigure.png",
                    [
                        "Jetzt bist du dran!", "",
                        "1. Überlege, welche Figuren du für deine Scene brauchst.",
                        "2. Erstelle ein neues Kostüm für deine Figur.",
                        "    Braucht deine Figur eventuell sogar mehrere Kostüme?",
                        "3. Vielleicht magst du sogar einen Hintergrund einfügen?",
                    ],
                ),
            ])],
            ["speechScene", new NavigationScene([
                new ExplainScene(
                    "Figuren sprechen lassen",
                    "scratchExplained",
                    "scratchSaySomething.jpg",
                    [
                        "Vielleicht möchtest du eine Figur etwas sagen lassen?",
                        "Wie das geht lernst du hier!"
                    ],
                ),
                new ExplainScene(
                    "Der \"sage\"-Block",
                    "scratchExplained",
                    "speechBlock.png",
                    [
                        "Der einfachste Weg ist es, den \"sage\"-Block zu verwenden.",
                        "Den findest du links unter \"Aussehen\".", "",
                        "Kleiner Tipp:", "Vielleicht passt auch der \"denke\"-Block besser?",
                    ],
                ),
                new ExplainScene(
                    "Der \"sage\"-Block",
                    "scratchExplained",
                    "startBlock.png",
                    [
                        "Am besten kombinierst du ihn mit dem \"grüne Flagge\"-Block,",
                        "um dein Spiel später starten zu können.",
                        "Den findest du unter \"Ereignisse\".", "",
                        "Wenn du jetzt oben rechts auf die grüne Flagge drückst",
                        "wird dein Programm ausgeführt."
                    ],
                ),
                new ExplainScene(
                    "Klänge",
                    "scratchExplained",
                    "sounds.png",
                    [
                        "Wir können auch echte Klänge abspielen!", "",
                        "Unter \"Klang\" auf der linken Seite gibt es z.B. den",
                        "Block \"spiele Klang <>\".", "",
                    ],
                ),
                new ExplainScene(
                    "Klänge",
                    "scratchExplained",
                    "sounds2.png",
                    [
                        "Unter dem Reiter \"Klänge\" kannst du auch", "eigene Klänge hinzufügen!", "",
                        "Gehe unten links auf das Mikrofon, um selber aufzunehmen"
                    ],
                    [[12.62, 7.29, Math.PI * 3 / 2], [5.47, -10.39, Math.PI * 3 / 2]]
                ),
                new ExplainScene(
                    "Aufgabe: Klänge",
                    "scratchExplained",
                    "sounds2.png",
                    [
                        "Jetzt bist du dran!", "",
                        "1. Welche Klänge brauchst du für deine Scene?",
                        "2. Wo kannst du diese aufnehmen?",
                        "3. Gibt es Text, den du einsprechen möchtest?"
                    ],
                ),
            ])],
        ],
        [],
        [
            "edit.png", "intro.png", "setup.jpg", "back_button.png", "costumesBackgrounds.jpg", "deleteCat.png",
            "arrow.png", "addFigure.png", "paintTools.png", "multipleCostumes.png", "yourOwnFigure.png",
            "dieGrosseWoerterfabrik.jpg", "scratchSaySomething.jpg", "speechBlock.png", "startBlock.png", "sounds.png",
            "sounds2.png",
        ]
    );
</script>
</body>
</html>
